<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Prabal Piya — Resume</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #050505;
      --text: #f5f5f5;
      --muted: #a3a3a3;
      --border: rgba(255, 255, 255, 0.18);
      --border-strong: rgba(255, 255, 255, 0.36);
      --panel: rgba(255, 255, 255, 0.04);
      --panel-hover: rgba(255, 255, 255, 0.075);

      --font-sans: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-mono: "JetBrains Mono", "IBM Plex Mono", Consolas, "Courier New", monospace;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
    }

    body {
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.07), transparent 32%),
        var(--bg);
    }

    .resume-page {
      width: min(1000px, calc(100% - 28px));
      margin: 0 auto;
      padding: 26px 0 50px;
    }

    .resume-top {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 30px;
      margin-bottom: 28px;
      padding-bottom: 24px;
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.16);
    }
    
    .resume-file-name {
      margin: 0;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: -0.02em;
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 10px 18px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--panel);
      color: var(--text);
      text-decoration: none;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      transition:
        transform 180ms ease,
        background 180ms ease,
        border-color 180ms ease;
    }

    .download-btn:hover {
      transform: translateY(-2px);
      background: var(--panel-hover);
      border-color: var(--border-strong);
    }

    .pdf-area {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .resume-pdf {
      width: min(850px, 100%);
      height: calc(100vh - 130px);
      min-height: 900px;
      border: 0;
      outline: 0;
      display: block;
      background: #ffffff;
    }

    @media (max-width: 760px) {
      .resume-page {
        width: min(100% - 16px, 1000px);
        padding: 20px 0 32px;
      }

      .resume-top {
        margin-bottom: 18px;
      }

      .resume-pdf {
        width: 100%;
        height: calc(100vh - 125px);
        min-height: 680px;
      }
    }
  </style>
</head>

<body>
  <main class="resume-page">
    <header class="resume-top">
      <p class="resume-file-name">resume.pdf</p>
      <a
        class="download-btn"
        href="assets/pdf/resume.pdf"
        download>
        Download Resume
      </a>
    </header>

    <section class="pdf-area">
      <iframe
        class="resume-pdf"
        src="assets/pdf/resume.pdf#toolbar=0&navpanes=0&scrollbar=1&view=FitH"
        title="Prabal Piya Resume">
      </iframe>
    </section>
  </main>
</body>
</html>
